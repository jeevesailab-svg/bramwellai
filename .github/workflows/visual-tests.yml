name: Visual Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  visual:
    name: Playwright visual tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run visual regression tests
        id: playwright
        run: bun run test:visual

      - name: Upload Playwright report
        id: upload-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-pr${{ github.event.pull_request.number || 'main' }}-run${{ github.run_number }}
          path: |
            playwright-report
            test-results
          retention-days: 14
          if-no-files-found: ignore

      - name: Collect failing diff images
        if: always() && failure()
        run: |
          set -e
          mkdir -p visual-diffs
          # Playwright writes -diff.png / -actual.png / -expected.png next to each
          # failing test's output folder under test-results/. Preserve the folder
          # structure so reviewers can see which test each triple belongs to.
          if [ -d test-results ]; then
            find test-results -type f \( \
              -name '*-diff.png' -o \
              -name '*-actual.png' -o \
              -name '*-expected.png' \
            \) -print0 | while IFS= read -r -d '' f; do
              rel="${f#test-results/}"
              dest="visual-diffs/$rel"
              mkdir -p "$(dirname "$dest")"
              cp "$f" "$dest"
            done
          fi
          count=$(find visual-diffs -type f -name '*.png' 2>/dev/null | wc -l | tr -d ' ')
          echo "Collected $count diff images."
          echo "diff_count=$count" >> "$GITHUB_ENV"

      - name: Upload failing diff images
        if: always() && failure() && env.diff_count != '0'
        id: upload-diffs
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs-pr${{ github.event.pull_request.number || 'main' }}-run${{ github.run_number }}
          path: visual-diffs
          retention-days: 14
          if-no-files-found: ignore

      - name: Build diff comment
        if: always() && failure() && github.event_name == 'pull_request'
        id: diff-comment
        env:
          RESULTS_JSON: test-results/results.json
          ARTIFACT_URL: ${{ steps.upload-report.outputs.artifact-url }}
          DIFFS_URL: ${{ steps.upload-diffs.outputs.artifact-url }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -e
          node scripts/build-visual-diff-comment.mjs > /tmp/visual-comment.md || true
          if [ -s /tmp/visual-comment.md ]; then
            echo "has_body=true" >> "$GITHUB_OUTPUT"
            {
              echo "body<<EOF"
              cat /tmp/visual-comment.md
              echo
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_body=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post/update PR comment
        if: always() && failure() && github.event_name == 'pull_request' && steps.diff-comment.outputs.has_body == 'true'
        uses: actions/github-script@v7
        env:
          COMMENT_BODY: ${{ steps.diff-comment.outputs.body }}
        with:
          script: |
            const marker = '<!-- visual-regression-comment -->';
            const body = process.env.COMMENT_BODY;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }